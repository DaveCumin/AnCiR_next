name = "ancir-nl"
main = "index.js"
# Must not be newer than the workerd binary bundled with your wrangler, or `wrangler dev`
# refuses to start ("newest date supported by this server binary is ..."). Bump alongside
# wrangler upgrades.
compatibility_date = "2026-07-02"
# The normalizer bundles @stdlib (the SimulatedData/Random seeded PRNGs), which expect a few
# Node globals. nodejs_compat satisfies them without pulling in a runtime.
compatibility_flags = ["nodejs_compat"]

# Workers Logs — keeps /build's structured logs (prompt, model, outcome) queryable in the
# dashboard, instead of only streaming to `wrangler tail`. See worker/README.md.
[observability]
enabled = true
head_sampling_rate = 1

[vars]
# Where the built session is opened. The Worker returns `${ANCIR_BASE_URL}/?loadFromURL=...`.
ANCIR_BASE_URL = "https://ancir.pages.dev"
# Sessions are transient hand-offs, not storage: expire them (seconds).
SESSION_TTL_S = "86400"
# Best-effort per-IP /build throttle per minute (0/unset = off). Cloudflare's native rate
# limiting is the real defence — this is a cheap backstop. Now that the default model below is
# funded by YOU rather than the caller, this stops being optional.
BUILD_RATE_MAX = "20"

# Default model, used when a caller sends no llm{} of their own (i.e. AnCiR's "AI" button).
# The endpoint and model NAME aren't secret, so they live here.
#
# The KEY MUST NOT. This file is committed, and anything the frontend could hold would be
# readable straight out of the browser bundle. Set it once, as a secret:
#     npx wrangler secret put OPENAI_API_KEY        # paste the Groq key
#
# Callers may still override all three per request (bring-your-own model); their key is used
# for that one call and never stored or logged.
OPENAI_BASE_URL = "https://api.groq.com/openai/v1"
OPENAI_MODEL = "openai/gpt-oss-120b"

# Transient session store. Create once, then paste the id here:
#   npx wrangler kv namespace create SESSIONS
[[kv_namespaces]]
binding = "SESSIONS"
id = "4a5db128db3c49cdb10b10769727a60a"

# Durable hit log. Workers Logs (above) only keeps ~7 days; every /build, /edit and /mcp hit is
# ALSO written here (time, model, prompt, outcome — never the key or an IP) so the record lasts
# and is SQL-queryable. Create once, apply the schema, then paste the id here:
#   npx wrangler d1 create ancir-nl-logs
#   npx wrangler d1 execute ancir-nl-logs --remote --file worker/schema.sql
# Read it back, e.g.:
#   npx wrangler d1 execute ancir-nl-logs --remote --command "SELECT ts, event, model, prompt FROM hits ORDER BY ts DESC LIMIT 20"
[[d1_databases]]
binding = "LOGS_DB"
database_name = "ancir-nl-logs"
database_id = "0224637a-ebd3-4e1f-a6e2-f380ad91505b"

# Cloudflare's own rate limiter, enforced at the edge — the real defence for /build now that
# the default model is on OUR key. No dashboard step and no custom domain needed: it works on
# workers.dev (WAF "rate limiting rules" do NOT — those are zone-level).
#
# `namespace_id` is just a number YOU pick to identify this limiter within the Worker; it
# doesn't refer to anything you have to create. `period` accepts ONLY 10 or 60 (seconds).
# Tune `limit` to taste: 10 builds/minute per IP is generous for humans, mean to a script.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Local dev only — relaxes the SSRF guard so you can point at a local Ollama:
#   npx wrangler dev --var ALLOW_LOCAL_LLM:1
