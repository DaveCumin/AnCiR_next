rly sampled records, and the correlogram (autocorrelation) reveals periodicity as recurring peaks at multiples of the cycle length.

The node takes a time column (xIN) and value columns (yIN) and, for each method, emits an x/y curve pair (rhythmicityx / rhythmicityy_*) for plotting the spectrum, correlogram, or magnitude curve, plus scalar stat ports (stat_*) such as the peak period and its power. Periodograms optionally draw a significance threshold at the chosen alpha. Reach for this node early in an analysis to establish the period before running a parametric fit such as cosinor, and prefer Lomb-Scargle whenever sampling is irregular.`,maths:["P_N(\\omega) = \\frac{1}{2\\sigma^2}\\left\\{\\frac{\\left[\\sum_i (x_i-\\bar x)\\cos\\omega(t_i-\\tau)\\right]^2}{\\sum_i \\cos^2\\omega(t_i-\\tau)} + \\frac{\\left[\\sum_i (x_i-\\bar x)\\sin\\omega(t_i-\\tau)\\right]^2}{\\sum_i \\sin^2\\omega(t_i-\\tau)}\\right\\}","\\tan(2\\omega\\tau) = \\frac{\\sum_i \\sin 2\\omega t_i}{\\sum_i \\cos 2\\omega t_i}","Q_p = \\frac{N\\sum_{h=1}^{p}(\\bar x_h-\\bar x)^2}{\\sum_{i=1}^{N}(x_i-\\bar x)^2}, \\quad Q_p \\sim \\chi^2_{p-1}"],references:[{cite:"Lomb NR (1976) Least-squares frequency analysis of unequally spaced data. Astrophysics and Space Science 39(2):447-462.",doi:"10.1007/BF00648343"},{cite:"Scargle JD (1982) Studies in astronomical time series analysis. II. Statistical aspects of spectral analysis of unevenly spaced data. The Astrophysical Journal 263:835-853.",doi:"10.1086/160554"},{cite:"Sokolove PG, Bushell WN (1978) The chi square periodogram: its utility for analysis of circadian rhythms. Journal of Theoretical Biology 72(1):131-160.",doi:"10.1016/0022-5193(78)90022-X"},{cite:"Enright JT (1965) The search for rhythmicity in biological time-series. Journal of Theoretical Biology 8(3):426-468."}],crosslinks:["ch6","ch8","ch9"]},MovingAnalysis:{description:`Most rhythm analyses assume the rhythm is stationary, one period and amplitude for the whole record. Moving Analysis relaxes that by re-running an analysis inside a window that slides along the series, so you can see how a parameter evolves. You choose the window length (windowSize) and how far it advances each step (stepSize), where each window's result is time-stamped (start, centre, or end via binLabel). Inside each window it can run any of the same analyses as the static nodes: a periodogram (Lomb-Scargle / chi-squared / Enright), cosinor, FFT, correlogram, rectangular-wave or double-logistic fit, controlled by the 'analysis' parameter and the matching method-specific settings.

Inputs are a time column (xIN) and value columns (yIN); the output is a family of stats_* columns giving the per-window result (such as the dominant period or fitted amplitude) that you plot against window time to reveal trends, transitions, or instability. This is the tool for non-stationary questions: entrainment transients, gradual period change under constant conditions, or amplitude changes across a treatment. Window length trades resolution against reliability, a longer window gives a steadier estimate but blurs fast change.`,maths:[],references:[{cite:"Refinetti R, Cornélissen G, Halberg F (2007) Procedures for numerical analysis of circadian rhythms. Biological Rhythm Research 38(4):275-325.",doi:"10.1080/09291010600903692"},{cite:"Sokolove PG, Bushell WN (1978) The chi square periodogram: its utility for analysis of circadian rhythms. Journal of Theoretical Biology 72(1):131-160.",doi:"10.1016/0022-5193(78)90022-X"}],crosslinks:["ch6","ch5","ch13"]},RectangularWave:{description:`Many activity rhythms are not sinusoidal but nearly binary: an animal is active for part of the cycle and at rest for the remainder. The Rectangular Wave node fits such an on/off pattern using a smooth square wave built from a hyperbolic-tangent (tanh) approximation, which stays differentiable so it can be fitted by nonlinear least squares. Its key extra parameter is the duty cycle d, the fraction of each period spent in the active state; a sharpness parameter kappa controls how square the corners are (large kappa approaches a true step). Period (omega), duty cycle and sharpness can each be pinned to a fixed value or left free, while the baseline, amplitude and phase are always fitted.

Inputs are a time column (xIN) and value columns (yIN); outputs are a fitted-curve column pair (rectwavex / rectwavey_*) to overlay on the data and a pvalue metric port from an optional permutation test. Choose this node over cosinor when the raw trace shows sharp transitions and a flat active plateau rather than a smooth sinusoid, and when the width of the active phase (the duty cycle) is itself a quantity of interest.`,maths:["f(t) = M + A\\,\\tanh\\!\\big(\\kappa\\,(\\sin(\\omega t + \\phi) - \\cos(\\pi d))\\big)","\\omega = \\frac{2\\pi}{T}"],references:[{cite:"Marquardt DW (1963) An algorithm for least-squares estimation of nonlinear parameters. Journal of the Society for Industrial and Applied Mathematics 11(2):431-441.",doi:"10.1137/0111030"}],crosslinks:["ch7","ch13"]},DoubleLogistic:{description:`A double-logistic curve is two sigmoids back to back: one that rises and one that falls, so together they trace a single pulse, a baseline, a smooth climb to a plateau, and a smooth return. This shape is the standard model in land-surface phenology (green-up and senescence) and transfers naturally to circadian on/off transitions. The fit gives interpretable transition parameters: t1 and t2 are the inflection times of the rise and fall, and k1 and k2 their steepness, alongside a baseline (M) and amplitude (A). In periodic mode the pulse is tiled at the chosen period T to model a repeating active-phase/rest-phase train without DC drift.

Inputs are a time column (xIN) and value columns (yIN); k1, k2 and the period can each be fixed or fitted. Outputs are a fitted-curve column pair (dlogx / dlogy_*) for plotting over the data and a pvalue metric port from an optional permutation test. Prefer this node when the feature of interest is the timing and abruptness of a transition (onset/offset) rather than a symmetric oscillation, or when the data are a one-shot ramp-up-then-down rather than a sustained rhythm.`,maths:["f(t) = M + A\\left[\\sigma\\!\\big(k_1(t - t_1)\\big) - \\sigma\\!\\big(k_2(t - t_2)\\big)\\right]","\\sigma(z) = \\frac{1}{1 + e^{-z}}"],references:[{cite:"Zhang X, Friedl MA, Schaaf CB, Strahler AH, Hodges JCF, Gao F, Reed BC, Huete A (2003) Monitoring vegetation phenology using MODIS. Remote Sensing of Environment 84(3):471-475.",doi:"10.1016/S0034-4257(02)00135-9"},{cite:"Marquardt DW (1963) An algorithm for least-squares estimation of nonlinear parameters. Journal of the Society for Industrial and Applied Mathematics 11(2):431-441.",doi:"10.1137/0111030"}],crosslinks:["ch7","ch13"]},TrendFit:{description:`TrendFit captures the slow, non-oscillatory part of a series, the baseline drift, growth, or decay that sits underneath any rhythm. You pick a model (linear, polynomial of a chosen degree, exponential, or logarithmic) and the node fits it by ordinary least squares, returning the fitted curve together with goodness-of-fit statistics and the fitted coefficients. Beyond simply describing a trend, its main use in chronobiology is detrending: subtracting a fitted baseline before spectral or cosinor analysis removes low-frequency power that would otherwise masquerade as, or obscure, a genuine rhythm.

Inputs are a time column (xIN) and value columns (yIN). Outputs are a fitted-curve column pair (trendx / trendy_*) to overlay or subtract, and scalar metric ports r2 (coefficient of determination), rmse (root-mean-square residual), and coef_* (the model coefficients, e.g. intercept and slope for a line). Choose the simplest model that captures the drift: a straight line for steady baseline change, a low-degree polynomial for gentle curvature, and exponential or logarithmic forms for saturating growth or decay. Over-fitting with a high polynomial degree risks absorbing part of the rhythm itself.`,maths:["y = \\sum_{j=0}^{d}\\beta_j\\,x^{j}","R^2 = 1 - \\frac{\\sum_i (y_i - \\hat y_i)^2}{\\sum_i (y_i - \\bar y)^2}, \\quad \\mathrm{RMSE} = \\sqrt{\\tfrac{1}{n}\\sum_i (y_i - \\hat y_i)^2}"],references:[{cite:"Refinetti R, Cornélissen G, Halberg F (2007) Procedures for numerical analysis of circadian rhythms. Biological Rhythm Research 38(4):275-325.",doi:"10.1080/09291010600903692"}],crosslinks:["ch4","ch11"]},FitFunction:{description:`FitFunction is the umbrella fitting node: it exposes the cosinor, rectangular-wave and double-logistic models through a single component and a common set of controls, so you can switch models on the same series without rewiring. Under the hood it dispatches to the same fitting routines as the dedicated nodes, minimising a least-squares objective (with a Levenberg-Marquardt style nonlinear optimiser for the non-linear models), and it standardises the significance testing with a shared label-permutation test whose statistic (default R²) and seed you control for reproducibility.

Inputs are a time column (xIN) and value columns (yIN); the 'model' parameter selects the waveform and the relevant model parameters (fixed period, harmonics, duty cycle, kappa, k1/k2, etc.) become active. Outputs are a fitted-curve column pair (fitx / fity_*) for plotting and permstats_* columns holding the permutation-test null distribution and result. Use this node for model comparison, when you want to fit an arbitrary supported shape, or when you specifically want the permutation-based p-value; for a single dedicated model with its own tailored output ports, the specific node (Cosinor, RectangularWave, DoubleLogistic) is more direct.`,maths:["\\hat\\theta = \\arg\\min_{\\theta} \\sum_i \\big(y_i - f(t_i;\\theta)\\big)^2"],references:[{cite:"Marquardt DW (1963) An algorithm for least-squares estimation of nonlinear parameters. Journal of the Society for Industrial and Applied Mathematics 11(2):431-441.",doi:"10.1137/0111030"},{cite:"Refinetti R, Cornélissen G, Halberg F (2007) Procedures for numerical analysis of circadian rhythms. Biological Rhythm Research 38(4):275-325.",doi:"10.1080/09291010600903692"}],crosslinks:["ch7","ch11"]},AverageProfile:{description:`The average daily profile is the folded 'mean day' of a recording: every sample's timestamp is reduced to its position within one period, samples are grouped into equally spaced phase bins over [0, period), and the mean of each bin is reported with its standard error. This collapses many cycles into a single representative waveform, revealing the characteristic shape (unimodal, bimodal, plateaued) and the timing of peaks and troughs while averaging away day-to-day noise. It is the same fold that the nonparametric rest-activity analysis performs internally, exposed here as a standalone primitive.

Inputs are a time column (xIN) and one or more value columns (yIN); the period sets the fold length and nBins the phase resolution. Outputs are a shared bin-centre column (avgprofx), one mean column per input series (avgprof_*), and a matching SEM column per series (avgprofsem_*), so you can plot the mean waveform with error bars. Use it for a quick, assumption-free look at rhythm shape and phase, as a companion to cosinor (which summarises that shape with parameters), or to prepare an averaged trace for further analysis. Bins with no samples return NaN, and bins with a single sample have no defined SEM.`,maths:["\\varphi_i = (t_i - t_0)\\bmod T","\\bar y_b = \\frac{1}{n_b}\\sum_{i\\in b} y_i, \\qquad \\mathrm{SEM}_b = \\frac{s_b}{\\sqrt{n_b}}"],references:[{cite:"Refinetti R, Cornélissen G, Halberg F (2007) Procedures for numerical analysis of circadian rhythms. Biological Rhythm Research 38(4):275-325.",doi:"10.1080/09291010600903692"}],crosslinks:["ch4","ch5"]},FormulaColumn:{description:`Formula Column creates a new column by evaluating a user-written expression once per row. The formula references other columns by token and combines them with arithmetic operators and common mathematical functions; each row substitutes that row's values and the result becomes the output column. It is the general-purpose escape hatch for per-row maths that the dedicated arithmetic nodes (Add, Multiply, Column Function) do not cover, such as ratios, normalised indices, or nonlinear transforms.

Because the expression is authored at runtime, no new node type has to be compiled; the trade-off is that it computes strictly element-wise (one output value per input row) rather than performing whole-series analyses.`,maths:["y_i = f(a_i, b_i, \\ldots)"],references:[],crosslinks:["ch4"]},DescribeData:{description:`Describe Data produces an exploratory summary of every numeric column wired into it — the sensible first look at a dataset before any test is chosen. For each column it reports the sample size, two measures of centre (mean and median), three of spread (standard deviation, total range, and the interquartile range between the first and third quartiles), the extremes (minimum and maximum), and two shape statistics (skewness and kurtosis). Quartiles use linear interpolation between order statistics (the type-7 / “inclusive” convention).

Skewness is the adjusted Fisher–Pearson standardised moment g₁ (sample-corrected, matching scipy.stats.skew(bias=False)): positive values mean a longer right tail, negative a longer left tail. Kurtosis is reported as bias-corrected excess kurtosis g₂ (scipy.stats.kurtosis(bias=False)), so a perfectly normal distribution scores 0; positive excess means heavier tails and a sharper peak than a normal, negative means lighter tails and a flatter peak.

The practical purpose is diagnostic. A large skewness or excess kurtosis is an early warning that mean-based, normality-assuming methods (t-tests, Pearson correlation, cosinor confidence intervals) may mislead, and that a transformation or a rank-based alternative may be wiser. Because the output is one tidy row per variable, it composes directly with a table for side-by-side comparison of many columns.`,maths:["\\bar{x} = \\tfrac{1}{n}\\sum_{i} x_i,\\qquad s = \\sqrt{\\tfrac{1}{n-1}\\sum_i (x_i-\\bar{x})^2}","\\text{IQR} = Q_3 - Q_1","g_1 = \\frac{\\sqrt{n(n-1)}}{n-2}\\;\\frac{m_3}{m_2^{3/2}},\\qquad m_k = \\tfrac1n\\sum_i (x_i-\\bar{x})^k","g_2 = \\frac{n-1}{(n-2)(n-3)}\\Big[(n+1)\\big(\\tfrac{m_4}{m_2^{2}}-3\\big) + 6\\Big]"],references:[{cite:"Tukey, J.W. (1977). Exploratory Data Analysis. Addison-Wesley, Reading MA."},{cite:"Joanes DN, Gill CA (1998) Comparing measures of sample skewness and kurtosis. The Statistician 47:183-189.",doi:"10.1111/1467-9884.00122"},{cite:"Hyndman RJ, Fan Y (1996) Sample quantiles in statistical packages. The American Statistician 50:361-365.",doi:"10.1080/00031305.1996.10473566"}],crosslinks:["ch4","ch13","glossary"]},NormalityTest:{description:`Normality Test checks, for each wired column, whether the data are consistent with being drawn from a normal (Gaussian) distribution. This is the assumption behind t-tests, ANOVA, Pearson correlation and the confidence intervals of cosinor analysis, so it is worth checking before relying on those methods. The node reports the test statistic, a p-value, and a plain verdict (a small p-value — below the chosen α, default 0.05 — means the data depart significantly from normal).

Three tests are offered. Shapiro–Wilk (the default) is the most powerful general test; AnCiR uses Royston's approximation (AS R94) and it is valid for 3 ≤ n ≤ 5000. D'Agostino–Pearson K² is an omnibus test that combines sample skewness and kurtosis (matching scipy's normaltest); it needs n ≥ 8 and its kurtosis term is unreliable below about n ≥ 20. Jarque–Bera uses the same skewness/kurtosis idea with a simpler large-sample form; it is defined down to small n but is weaker there.

A caution on interpretation: with large samples these tests become sensitive to departures too small to matter in practice, while with tiny samples they have little power to detect real non-normality. Read the verdict alongside the shape statistics from Describe Data and, ideally, a histogram or Q–Q plot rather than treating the p-value as a hard gate.`,maths:["\\text{Shapiro–Wilk: } W = \\frac{\\left(\\sum_i a_i x_{(i)}\\right)^2}{\\sum_i (x_i-\\bar{x})^2}","\\text{D'Agostino–Pearson: } K^2 = Z(\\sqrt{b_1})^2 + Z(b_2)^2 \\;\\sim\\; \\chi^2_2","\\text{Jarque–Bera: } JB = \\frac{n}{6}\\left(S^2 + \\tfrac{1}{4}(K-3)^2\\right) \\;\\sim\\; \\chi^2_2"],references:[{cite:"Shapiro SS, Wilk MB (1965) An analysis of variance test for normality (complete samples). Biometrika 52:591-611.",doi:"10.1093/biomet/52.3-4.591"},{cite:"Royston P (1992) Approximating the Shapiro-Wilk W-test for non-normality. Statistics and Computing 2:117-119.",doi:"10.1007/BF01891203"},{cite:"D'Agostino R, Pearson ES (1973) Tests for departure from normality. Empirical results for the distributions of b2 and sqrt(b1). Biometrika 60:613-622.",doi:"10.1093/biomet/60.3.613"},{cite:"Jarque CM, Bera AK (1987) A test for normality of observations and regression residuals. International Statistical Review 55:163-172.",doi:"10.2307/1403192"}],crosslinks:["ch13","ch4","glossary"]},ChiSquared:{description:`The Chi-squared test works with counts of categories rather than measured values. It has two modes. In the independence mode (the default) you supply two categorical columns; the node builds their contingency table and tests whether the two variables are associated, comparing the observed cell counts with the counts expected if the row and column variables were independent. In the goodness-of-fit mode you supply one column of counts and test whether they depart from a uniform expectation (every category equally likely) — useful, for example, for asking whether events are spread evenly across the phases of a cycle.

The statistic sums the squared, expectation-scaled discrepancies over all cells and is compared with a χ² distribution whose degrees of freedom depend on the table shape. For a 2×2 independence table AnCiR applies Yates' continuity correction by default (matching scipy), which shrinks each discrepancy by ½ to compensate for approximating discrete counts with a continuous distribution; the correction can be switched off.

The test assumes independent observations and adequate expected counts — a common rule of thumb is that expected counts should be at least 5 in most cells. When counts are sparse an exact test (for example Fisher's) is preferable; the node surfaces a warning in that situation.`,maths:["\\chi^2 = \\sum_{\\text{cells}} \\frac{(O_{ij}-E_{ij})^2}{E_{ij}},\\qquad E_{ij} = \\frac{R_i\\,C_j}{N}","\\text{Yates } (2{\\times}2)\\text{: } \\chi^2 = \\sum \\frac{(|O_{ij}-E_{ij}|-\\tfrac12)^2}{E_{ij}}","\\text{df} = (r-1)(c-1)\\ \\text{(independence)},\\quad k-1\\ \\text{(goodness-of-fit)}"],references:[{cite:"Pearson K (1900) On the criterion that a given system of deviations from the probable... Philosophical Magazine 50:157-175.",doi:"10.1080/14786440009463897"},{cite:"Yates F (1934) Contingency tables involving small numbers and the chi-square test. Supplement to the JRSS 1:217-235.",doi:"10.2307/2983604"},{cite:"Agresti, A. (2013). Categorical Data Analysis, 3rd ed. Wiley, Hoboken NJ."}],crosslinks:["ch12","ch13","glossary"]},Correlation:{description:`Correlation measures how strongly pairs of columns move together. Wire in two or more numeric columns and the node returns a tidy pairwise table: for every pair it reports the correlation coefficient r (from −1 for a perfect inverse relationship, through 0 for none, to +1 for a perfect direct one), a p-value testing whether that correlation could plausibly be zero, and the sample size n each pair was computed on.

Two coefficients are available. Pearson's r captures linear association and assumes roughly normal, outlier-free data. Spearman's ρ is Pearson's r applied to the ranks; it captures any monotonic relationship and is robust to outliers and non-normal shapes. The default method is “auto”: the node checks each column for normality and chooses Pearson when the data look normal, Spearman otherwise, so the coefficient is matched to the data without a manual decision.

Two cautions apply as always: correlation is not causation, and a coefficient near zero only rules out a monotonic trend — a strong but non-monotonic (for example cyclic) relationship can still hide behind r ≈ 0, which is exactly why rhythmic data often need the periodogram and cosinor tools rather than a plain correlation.`,maths:["r = \\frac{\\sum_i (x_i-\\bar{x})(y_i-\\bar{y})}{\\sqrt{\\sum_i (x_i-\\bar{x})^2}\\,\\sqrt{\\sum_i (y_i-\\bar{y})^2}}","\\rho = 1 - \\frac{6\\sum_i d_i^2}{n(n^2-1)},\\qquad d_i = \\operatorname{rank}(x_i)-\\operatorname{rank}(y_i)","t = r\\sqrt{\\frac{n-2}{1-r^2}} \\;\\sim\\; t_{n-2}"],references:[{cite:"Pearson K (1896) Mathematical contributions to the theory of evolution. III. Regression, heredity and panmixia. Phil. Trans. R. Soc. A 187:253-318.",doi:"10.1098/rsta.1896.0007"},{cite:"Spearman C (1904) The proof and measurement of association between two things. American Journal of Psychology 15:72-101.",doi:"10.2307/1412159"}],crosslinks:["ch9","ch11","glossary"]},CrossCorrelation:{description:`Cross-correlation asks how two time series line up in time. It takes two series and, at each lag k, correlates one against the other shifted by k steps; the result is a cross-correlogram — correlation plotted against lag. The lag at which correlation peaks estimates the delay between the two signals: if series Y tracks series X but a few samples later, the peak sits at that offset, quantifying the lead–lag relationship (for example, how far behind a light cue an activity rhythm follows).

Each lag's correlation can be computed with Pearson's r (linear coupling) or Spearman's ρ (monotonic, rank-based and outlier-robust). The maximum lag scanned is set by the maxLag parameter, and every lag's correlation comes with a p-value.

The technique assumes the series are sampled on the same, regularly spaced time grid, since a “lag” must correspond to a fixed time step. Interpret peaks with care: strong autocorrelation within each series (as circadian data invariably have) inflates apparent cross-correlations and widens the range of lags that look significant, so pre-whitening or comparison against a suitable null is advisable before reading a delay as real.`,maths:["r_{xy}(k) = \\frac{\\sum_t (x_t-\\bar{x})(y_{t+k}-\\bar{y})}{\\sqrt{\\sum_t (x_t-\\bar{x})^2}\\,\\sqrt{\\sum_t (y_{t+k}-\\bar{y})^2}}","\\hat{k} = \\arg\\max_k\\, |r_{xy}(k)|"],references:[{cite:"Box, G.E.P., Jenkins, G.M., Reinsel, G.C. (2008). Time Series Analysis: Forecasting and Control, 4th ed. Wiley, Hoboken NJ."},{cite:"Chatfield, C. (2003). The Analysis of Time Series: An Introduction, 6th ed. Chapman & Hall/CRC, Boca Raton FL."}],crosslinks:["ch9","glossary"]},LogisticRegression:{description:`Logistic regression models a yes/no (binary) outcome from one or more predictor columns. Instead of fitting a straight line (which could stray below 0 or above 1), it models the log-odds of the outcome as a linear function of the predictors, so the fitted probability is always squeezed into the 0–1 range by the logistic (sigmoid) curve. One level of the outcome is taken as the “positive” class (= 1).

AnCiR fits the model by iteratively-reweighted least squares (IRLS / Fisher scoring, the maximum-likelihood method). The output is one tidy row per term: the coefficient and its standard error, a Wald z-statistic and p-value, and the odds ratio exp(β) with a 95% confidence interval — the odds ratio being the more interpretable summary (how the odds of the outcome multiply per one-unit rise in that predictor). Alongside the coefficients it reports overall model fit: the log-likelihood, a likelihood-ratio test of the whole model against an intercept-only null, and McFadden's pseudo-R². Per-observation fitted probabilities and the linear predictor are also emitted so the fit can be plotted.

Interpretation notes: an odds ratio of 1 means no effect, above 1 raises the odds and below 1 lowers them. Wald intervals can behave poorly when a predictor perfectly separates the classes or when events are very rare, so treat huge coefficients with correspondingly huge standard errors with suspicion.`,maths:["\\operatorname{logit} p_i = \\ln\\frac{p_i}{1-p_i} = \\beta_0 + \\beta_1 x_{i1} + \\dots + \\beta_p x_{ip}","p_i = \\frac{1}{1+e^{-\\eta_i}},\\qquad \\eta_i = \\beta_0 + \\sum_j \\beta_j x_{ij}","\\text{OR}_j = e^{\\beta_j},\\qquad R^2_{\\text{McF}} = 1 - \\frac{\\ell(\\hat\\beta)}{\\ell_0}"],references:[{cite:"Cox DR (1958) The regression analysis of binary sequences. JRSS Series B 20:215-242.",doi:"10.1111/j.2517-6161.1958.tb00292.x"},{cite:"McFadden, D. (1974). Conditional logit analysis of qualitative choice behavior. In: Frontiers in Econometrics (P. Zarembka, ed.), 105-142. Academic Press, New York."},{cite:"McCullagh, P., Nelder, J.A. (1989). Generalized Linear Models, 2nd ed. Chapman & Hall, London."},{cite:"Hosmer, D.W., Lemeshow, S., Sturdivant, R.X. (2013). Applied Logistic Regression, 3rd ed. Wiley, Hoboken NJ."}],crosslinks:["ch11","glossary"]},circularphase:{description:`The Circular phase plot places phases on a clock face rather than a straight axis, so that late-night and early-morning times sit next to each other as they should. Wire in one or more phase columns — acrophases, activity-onset times, or peak phases — and each becomes a coloured group of points arranged around a circle whose full turn equals the chosen period (24 h by default, but adjustable, and readable in hours, degrees or radians).

For every group the plot draws its mean resultant vector: the direction points to the preferred phase (the circular mean) and the length, the mean resultant length R, measures how tightly the phases cluster (R near 1 = coincident, near 0 = scattered). This is the visual companion to the Rayleigh test. Optional rose wedges bin the circle into a polar histogram (with or without the individual points overlaid), and an optional Watson–Williams test compares the groups' mean directions (the circular analogue of one-way ANOVA).

Wiring an optional time column (hours or a timestamp, folded onto the period) to a series changes what it shows: each point is then placed at its measurement time, with radius equal to its measured value, turning the plot into a value-versus-clock-time display, and the group's vector becomes an amplitude-weighted acrophase in which larger-amplitude cycles pull the mean direction toward their phase. The underlying circular statistics are shared with the Rayleigh test node.`,maths:["\\theta_i = 2\\pi\\,\\frac{t_i \\bmod \\tau}{\\tau}","\\bar{C} = \\tfrac1n\\sum_i \\cos\\theta_i,\\quad \\bar{S} = \\tfrac1n\\sum_i \\sin\\theta_i,\\quad R = \\sqrt{\\bar{C}^2+\\bar{S}^2}","\\text{(weighted) }\\ \\bar{C} = \\tfrac{1}{\\sum_i w_i}\\sum_i w_i\\cos\\theta_i,\\quad \\bar{S} = \\tfrac{1}{\\sum_i w_i}\\sum_i w_i\\sin\\theta_i"],references:[{cite:"Batschelet, E. (1981). Circular Statistics in Biology. Academic Press, London."},{cite:"Fisher, N.I. (1993). Statistical Analysis of Circular Data. Cambridge University Press, Cambridge."},{cite:"Zar, J.H. (1999). Biostatistical Analysis, 4th ed., ch. 26-27. Prentice Hall, Upper Saddle River NJ."}],crosslinks:["ch12","ch7","glossary"]},correlationheatmap:{description:`The Correlation heatmap turns a table of numeric columns into a coloured correlation matrix, so the pattern of relationships across many variables can be read at a glance. Each cell shows the correlation between the pair of columns for its row and column, encoded as colour: a diverging scale runs from strong negative (one hue), through zero (neutral), to strong positive (the opposite hue), with the diagonal always +1 (each variable with itself).

It is the visual counterpart of the Correlation node: same coefficients, but arranged as a grid rather than a list, which makes clusters of co-varying variables and lone outliers jump out. It is most useful as an exploratory overview before choosing which pairs deserve a formal test or a scatter plot.

Read it with the same caveats as any correlation: the colour shows the strength of a (by default linear) association, not causation, and a near-neutral cell only means no monotonic trend — a cyclic or otherwise non-monotonic relationship can still be present. For rhythmic variables, confirm suggestive cells with the appropriate rhythm-aware analysis.`,maths:["r_{jk} = \\frac{\\sum_i (x_{ij}-\\bar{x}_j)(x_{ik}-\\bar{x}_k)}{\\sqrt{\\sum_i (x_{ij}-\\bar{x}_j)^2}\\,\\sqrt{\\sum_i (x_{ik}-\\bar{x}_k)^2}}"],references:[{cite:"Friendly M (2002) Corrgrams: Exploratory displays for correlation matrices. The American Statistician 56:316-324.",doi:"10.1198/000313002533"}],crosslinks:["ch9","glossary"]},pairsplot:{description:`The Pairs plot (a scatterplot matrix, or SPLOM) shows every column plotted against every other in one grid, so all the pairwise relationships in a dataset can be inspected together. Following the familiar pairs.panels layout, the diagonal carries each variable's own histogram (its distribution), the panels above the diagonal show the scatter of each pair with a fitted trend line, and the panels below report the corresponding correlation coefficient.

This single figure combines three of the exploratory tools — distribution shape, pairwise scatter, and correlation — into one view, making it an efficient first pass over a fresh dataset: skewed variables, nonlinear relationships, clusters and outliers all become visible at once, and the upper/lower symmetry lets the eye cross-check a strong correlation number against the shape of its scatter.

Use it to decide where to look more closely rather than as a final analysis. A curved or looping scatter with a near-zero correlation is a classic sign that a linear summary is the wrong tool — exactly the situation where cyclic data call for the periodogram, cosinor and circular-statistics nodes instead.`,maths:[],references:[{cite:"Cleveland, W.S. (1993). Visualizing Data. Hobart Press, Summit NJ."},{cite:"Emerson JW, Green WA, Schloerke B, et al. (2013) The generalized pairs plot. Journal of Computational and Graphical Statistics 22:79-91.",doi:"10.1080/10618600.2012.694762"}],crosslinks:["ch4","ch9","glossary"]}},m2={nodes:JSON.parse(`[{"id":"actogram","displayName":"Actogram","kind":"plot","family":"Plots","description":"Actogram (double-plotted activity over days).","hideFromPalette":false,"inputs":[{"name":"time","kind":"column","cardinality":"many"},{"name":"values","kind":"column","cardinality":"many"}],"params":[],"outputs":[],"demo":"sessions/demos/demo-workflow-rest-activity.json"},{"id":"boxplot","displayName":"Boxplot","kind":"plot","family":"Plots","description":"Boxplot summarising the distribution of a column by group.","hideFromPalette":false,"inputs":[{"name":"x","kind":"column","cardinality":"many"},{"name":"y","kind":"column","cardinality":"many"}],"params":[],"outputs":[],"demo":"sessions/demos/demo-workflow-stats-two-group.json"},{"id":"circularphase","displayName":"Circular phase plot","kind":"plot","family":"Plots","description":"Circular phase plot: one or more phase columns on an adjustable-period clock, each a coloured group with its Rayleigh mean-resultant vector; optional rose wedges and a Watson-Williams equal-mean-direction test. Wiring an optional time column (hours or timestamp, folded by period) to a series plots it at its measurement time with radius = value instead, and the vector becomes an amplitude-weighted acrophase.","hideFromPalette":false,"inputs":[{"name":"time","kind":"column","cardinality":"many"},{"name":"values","kind FromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"edits"}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-editvalue.json"},{"id":"FilterByOtherCol","displayName":"Filter","kind":"process","family":"Filtering","description":"Filter rows based on the values of another column.","hideFromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"conditions","default":[{"byColId":-1,"isOperator":"==","byColValue":0,"parentColId":-1}]}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-filterbyothercol.json"},{"id":"FrequencyFilter","displayName":"Frequency Filter","kind":"process","family":"Filtering","description":"FFT-based low-, high-, or band-pass filter over an evenly sampled series.","hideFromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"type","default":"low"},{"name":"low","default":0.1},{"name":"high","default":0.4}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-frequencyfilter.json"},{"id":"Multiply","displayName":"Multiply","kind":"process","family":"Arithmetic","description":"Multiply the input column by a constant or another column.","hideFromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"value","default":1}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-multiply.json"},{"id":"normalize","displayName":"Normalize","kind":"process","family":"Arithmetic","description":"Normalize the column to a chosen range or by a reference value.","hideFromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"normalizationType","default":"z-score"},{"name":"customMin","default":0},{"name":"customMax","default":1}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-normalize.json"},{"id":"OutlierRemoval","displayName":"Remove Outliers","kind":"process","family":"Filtering","description":"Detect and remove outliers from the column.","hideFromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"method","default":"zscore"},{"name":"iqrMultiplier","default":1.5},{"name":"zThreshold","default":3}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-outlierremoval.json"},{"id":"RemoveTrend","displayName":"Remove Trend","kind":"process","family":"Filtering","description":"Remove a fitted trend (linear, polynomial, etc.) from the column.","hideFromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"xColId","default":-1},{"name":"model","default":"linear"},{"name":"polyDegree","default":2},{"name":"slidingWindow","default":false},{"name":"windowSize","default":10}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-removetrend.json"},{"id":"Sub","displayName":"Substitute","kind":"process","family":"Arithmetic","description":"Find a specific value in the column and replace it with another (e.g. swap a missing-data code like −999 for a different value).","hideFromPalette":false,"inputs":[{"name":"input","kind":"column","cardinality":"one"}],"params":[{"name":"find","default":0},{"name":"replace","default":0}],"outputs":[{"name":"output","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-process-sub.json"},{"id":"AverageProfile","displayName":"Average Profile","kind":"tableProcess","family":"Analysis","description":"Average daily profile — fold a series onto one period and show the per-bin mean (± SEM).","hideFromPalette":false,"inputs":[{"name":"xIN","kind":"column","cardinality":"one"},{"name":"yIN","kind":"column","cardinality":"many"}],"params":[{"name":"period","default":24},{"name":"nBins","default":24}],"outputs":[{"name":"avgprofx","kind":"column","cardinality":"one"},{"name":"avgprof_*","kind":"column","cardinality":"many","dynamicPrefix":"avgprof_"},{"name":"avgprofsem_*","kind":"column","cardinality":"many","dynamicPrefix":"avgprofsem_"}],"demo":"sessions/demos/demo-tp-averageprofile.json"},{"id":"BinnedData","displayName":"Bin Data","kind":"tableProcess","family":"Binning","description":"Bin time-series values into regular intervals and aggregate per bin.","hideFromPalette":false,"inputs":[{"name":"xIN","kind":"column","cardinality":"one"},{"name":"yIN","kind":"column","cardinality":"many"}],"params":[{"name":"binMode","default":"uniform"},{"name":"binSize","default":0.25},{"name":"binStart","default":0},{"name":"stepSize","default":0.25},{"name":"diffStep","default":false},{"name":"cuts","default":[]},{"name":"aggFunction","default":"mean"}],"outputs":[{"name":"binnedx","kind":"column","cardinality":"one"},{"name":"binnedy_*","kind":"column","cardinality":"many","dynamicPrefix":"binnedy_"}],"demo":"sessions/demos/demo-tp-binneddata.json"},{"id":"BlankColumn","displayName":"Enter Data","kind":"tableProcess","family":"Sources","description":"Enter data by hand, or paste CSV/JSON.","hideFromPalette":false,"inputs":[],"params":[{"name":"N","default":10}],"outputs":[{"name":"result","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-tp-blankcolumn.json"},{"id":"ChiSquared","displayName":"Chi-squared test","kind":"tableProcess","family":"Analysis","description":"Chi-squared test: independence of two categorical variables (contingency table), or goodness-of-fit of counts against a uniform expectation.","hideFromPalette":false,"inputs":[{"name":"xIN","kind":"column","cardinality":"one"},{"name":"yIN","kind":"column","cardinality":"one"}],"params":[{"name":"testType","default":"independence"},{"name":"correction","default":true}],"outputs":[{"name":"statistic","kind":"column","cardinality":"one","metric":true},{"name":"pvalue","kind":"column","cardinality":"one","metric":true},{"name":"df","kind":"column","cardinality":"one","metric":true}],"demo":"sessions/demos/demo-workflow-stats-chi-square.json"},{"id":"CircadianFunctionIndex","displayName":"Circadian Function Index","kind":"tableProcess","family":"Analysis","description":"Circadian Function Index (0–1) summarising rest-activity rhythm robustness from nonparametric IS, IV and RA (Ortiz-Tudela et al. 2010).","hideFromPalette":false,"inputs":[{"name":"xIN","kind":"column","cardinality":"one"},{"name":"yIN","kind":"column","cardinality":"many"}],"params":[{"name":"epochHours","default":1},{"name":"period","default":24},{"name":"mWindow","default":10},{"name":"lWindow","default":5}],"outputs":[{"name":"CFI","kind":"column","cardinality":"one","metric":true},{"name":"IS","kind":"column","cardinality":"one","metric":true},{"name":"IV","kind":"column","cardinality":"one","metric":true},{"name":"RA","kind":"column","cardinality":"one","metric":true}],"demo":"sessions/demos/demo-tp-circadianfunctionindex.json"},{"id":"CollectColumns","displayName":"Collect Columns","kind":"tableProcess","family":"Transform","description":"Collect (concatenate) several columns into one.","hideFromPalette":true,"inputs":[{"name":"colIds","kind":"column","cardinality":"many"}],"params":[],"outputs":[{"name":"outCols","kind":"column","cardinality":"many"}],"demo":"sessions/demos/demo-tp-collectcolumns.json"},{"id":"ColumnFunctions","displayName":"Column Function","kind":"tableProcess","family":"Arithmetic","description":"Apply a per-column aggregate function (mean, sum, etc.) across rows or groups.","hideFromPalette":false,"inputs":[{"name":"xsIN","kind":"column","cardinality":"many"}],"params":[{"name":"func","default":"add"},{"name":"yIN","default":[]},{"name":"data","default":[]}],"outputs":[{"name":"result","kind":"column","cardinality":"one"}],"demo":"sessions/demos/demo-tp-columnfunctions.json"},{"id":"ColumnSet","display
