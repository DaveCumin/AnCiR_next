    unreliable due to irregular activity patterns.</p> <!> <!> <!>`,1);function Rm(t){const e=[{year:"1954",text:"Norbert Wiener and others formalise the autocorrelation function for signal analysis ‚ÄĒ a foundation quickly adopted in biological rhythm research."},{year:"1990s",text:'Non-parametric circadian rhythm analysis (NPCRA) metrics including Interdaily Stability (IS) and Intradaily Variability (IV) are developed for actigraphic data in clinical and ageing research (van Someren et al.<sup class="cite"><a href="#ref-10">[10]</a></sup>).'}],r=["Metric","What it measures","Range"],a=[["Interdaily Stability (IS)","Fraction of total variance explained by the average 24-hour pattern ‚ÄĒ a measure of how regular the daily rhythm is across multiple days","0 (no regularity) to 1 (perfect)"],["Intradaily Variability (IV)","Mean squared difference between consecutive time points relative to overall variance ‚ÄĒ a measure of within-day fragmentation","0 (smooth) to 2 (highly fragmented)"]],n=String.raw`r(k) = \frac{\displaystyle\sum_i (y_i - \bar{y})(y_{i+k} - \bar{y})}{\displaystyle\sum_i (y_i - \bar{y})^2}`,i=String.raw`\hat{\tau} = k_{\text{peak}} \cdot \Delta t \quad \text{(first ACF peak lag} \times \text{sampling interval)}`;kt(t,{id:"ch9",num:"Chapter 9",title:"Correlograms",children:(s,o)=>{var l=Mm(),h=at(l);yr(h,{get entries(){return e}});var d=M(h,6);Vt(d,{get tex(){return n}});var m=M(d,6);Vt(m,{get tex(){return i}});var v=M(m,8);S0(v,{get headers(){return r},get rows(){return a}});var g=M(v,2);_m(g,{});var y=M(g,2);It(y,{title:"Creating a Correlogram in AnCiR",tip:"",children:(A,x)=>{var T=Cm();ee(A,T)},$$slots:{default:!0}}),ee(s,l)},$$slots:{default:!0}})}var zm=re("<p>PRC analysis is not yet implemented as a dedicated module in AnCiR. To construct a PRC manually:</p> <ol><li>Import your data with columns: <strong>Stimulus CT</strong> (circadian time of stimulus, in hours) and <strong>Phase Shift</strong> (őĒhours, positive = advance, negative = delay).</li> <li>Create a <strong>Scatterplot</strong> with Stimulus CT on the X axis and Phase Shift on the Y axis.</li> <li>Add a <strong>Smooth Data table process</strong> (LOESS or Whittaker-Eilers) to produce a smooth PRC curve overlay.</li> <li>To overlay multiple PRCs (e.g., different stimulus intensities), add each as a separate data series in the same Scatterplot.</li></ol>",1),Em=re('<!> <h3 class="section-head">Overview</h3> <p>A <strong>phase response curve (PRC)</strong> describes how the timing (phase) of a circadian rhythm shifts in response to a stimulus applied at different phases of the clock. PRCs are essential for predicting entrainment, understanding zeitgeber action, and designing clinical interventions such as timed light therapy or melatonin administration.</p> <h3 class="section-head">Types of PRCs</h3> <ul><li><strong>Type 1 (weak) PRCs</strong> ‚ÄĒ smooth, continuous phase shifts; small advances and delays. Produced by most environmental zeitgebers at moderate intensities.</li> <li><strong>Type 0 (strong) PRCs</strong> ‚ÄĒ large phase shifts that can reset the clock to any phase regardless of initial state. Produced by intense stimuli (bright light, certain pharmacological agents).</li></ul> <h3 class="section-head">Constructing a PRC</h3> <p>Animals in constant conditions receive a brief stimulus at different circadian times (CT). The resulting phase shift (őĒő¶) is plotted against the CT of stimulation. For light PRCs: phase delays occur in the early subjective night; phase advances in the late subjective night/early morning; the subjective day is relatively insensitive ("dead zone").</p> <!> <!>',1);function Pm(t){kt(t,{id:"ch10",num:"Chapter 10",title:"Phase Response Curves",children:(e,r)=>{var a=Em(),n=at(a);yr(n,{entries:[{year:1954,text:"Colin Pittendrigh constructs the first formal phase response curves (PRCs) for light pulses in Drosophila ‚ÄĒ demonstrating that the effect of a zeitgeber depends critically on when in the cycle it is applied."},{year:"1980s‚Äď90s",text:"Human PRCs for light (Czeisler, Kronauer) and melatonin (Lewy) are constructed using carefully controlled laboratory studies, enabling clinical applications in jet lag, shift work, and delayed sleep-wake phase disorder."},{year:"Present",text:"PRCs have been characterised for light, melatonin, exercise, temperature, and feeding across many organisms, with increasing clinical application in timed light therapy and chronobiotic treatments."}]});var i=M(n,14);hi(i,{title:"Human Clinical Relevance",children:(o,l)=>{Tr();var h=cc("Human light and melatonin PRCs have direct clinical relevance ‚ÄĒ they underpin timing protocols for jet lag recovery, shift-work adaptation, delayed sleep-wake phase disorder, and seasonal affective disorder treatment.");ee(o,h)},$$slots:{default:!0}});var s=M(i,2);It(s,{title:"Phase Response Curves in AnCiR",tip:"For formal PRC construction and Type 0/1 classification, dedicated tools such as the R package zeitgebr or BioDare2 are recommended.",children:(o,l)=>{var h=zm();Tr(2),ee(o,h)},$$slots:{default:!0}}),ee(e,a)},$$slots:{default:!0}})}var Dm=re("<p>Formal mixed-effects cosine models and GAMs are not currently implemented in AnCiR. However, AnCiR provides several tools for related analyses:</p> <ol><li><strong>Cosinor (fixed-period, multiple harmonics)</strong> ‚ÄĒ approximates a GAM for the circadian component. Use 2‚Äď3 harmonics for non-sinusoidal waveforms.</li> <li><strong>Collect Columns</strong> or <strong>Long To Wide</strong> with nested Cosinor ‚ÄĒ runs individual cosinor fits on all subjects at once and downloads a statistics table for further analysis in R.</li> <li><strong>Smooth Data (LOESS)</strong> ‚ÄĒ produces a non-parametric smooth of the data, useful for exploring non-sinusoidal shape before fitting a parametric model.</li> <li>For full mixed-effects modelling, export your data from AnCiR (click the download icon on any Data View plot) and use R (<em>lme4</em>) or Python (<em>statsmodels</em>).</li></ol>",1),Im=re('<!> <h3 class="section-head">Mixed-Effects Cosine Models</h3> <p>For repeated measures from multiple subjects, a linear mixed-effects model incorporating cosine predictors provides a powerful approach:</p> <!> <p>The random intercept (1|subject) accounts for between-subject variability. Fixed effects can include group membership, continuous covariates (age, BMI), and interactions. Implemented in R via <em>lme4</em>; in Python via <em>statsmodels</em>.</p> <h3 class="section-head">Generalised Additive Models (GAMs)</h3> <p>GAMs replace linear predictors with smooth functions estimated from the data. A <strong>cyclic cubic spline smoother</strong> ‚ÄĒ enforcing continuity at the 24-hour boundary ‚ÄĒ captures complex non-sinusoidal waveforms:</p> <!> <p>GAMs are particularly useful for hormone data with sharp peaks, or activity data with extended rest bouts deviating substantially from a cosine. Implemented in R via <em>mgcv</em>.</p> <!>',1);function Bm(t){const e=String.raw`y(t) = \beta_0 + \beta_1\cos\!\left(\frac{2\pi t}{\tau}\right) + \beta_2\sin\!\left(\frac{2\pi t}{\tau}\right) + \text{group}[\cdots] + (1|\text{subject}) + \varepsilon`,r=String.raw`y(t) = f(t \bmod 24) + \text{covariates} + \varepsilon`;kt(t,{id:"ch11",num:"Chapter 11",title:"General Linear and Additive Models",children:(a,n)=>{var i=Im(),s=at(i);yr(s,{entries:[{year:"1990s",text:"Linear mixed-effects models (LMEMs) provide a natural framework for multi-subject chronobiological studies. R packages nlme and later lme4 make these methods accessible."},{year:"2000s‚Äďpresent",text:"Generalised Additive Models (GAMs) with cyclic smooths are applied to circadian data to handle non-sinusoidal waveforms. LASSO and ridge regression enable high-dimensional circadian omics analysis."}]});var o=M(s,6);Vt(o,{get tex(){return e}});var l=M(o,8);Vt(l,{get tex(){return r}});var h=M(l,4);It(h,{title:"Linear/Additive Models in AnCiR",tip:"",children:(d,m)=>{var v=Dm();Tr(2),ee(d,v)},$$slots:{default:!0}}),ee(a,i)},$$slots:{default:!0}})}var Lm=re("<p>A dedicated circular statistics module is not currently in AnCiR. For acrophase data from Cosinor fits:</p> <ol><li>Use <strong>Collect Columns + Cosinor</strong> to obtain acrophase values for multiple subjects.</li> <li>Download the results table via a <strong>Data View</strong> plot linked to the Cosinor statistics table.</li> <li>Import the acrophase column into R (<em>circular</em> package) or Python (<em>pingouin</em>) for Rayleigh test, circular mean, and Watson-Williams group comparison.</li> <li>Alternatively, use <strong>BioDare2</strong> (biodare2.ed.ac.uk) for circular statistics on acrophase data.</li></ol>",1),qm=re('<!> <p class="chapter-intro">Phase angles ‚ÄĒ acrophases, activity onset times, peak cortisol times ‚ÄĒ are <strong>circular variables</strong> that wrap around at 360¬į or 24 hours. Standard linear statistics (mean, SD, t-test) are inappropriate and give misleading results for circular data. Circular statistics provide the correct framework.</p> <h3 class="section-head">Descriptive Circular Statistics</h3> <!> <p>R = 1 means all phases are identical; R = 0 means phases are uniformly distributed. <strong>Circular variance</strong> = 1 ‚ąí R.</p> <h3 class="section-head">Tests for Circular Data</h3> <ul><li><strong>Rayleigh test</strong> ‚ÄĒ tests whether phases are uniformly distributed (no preferred direction). Significant if R is large relative to n.</li> <li><strong>Watson-Williams test</strong> ‚ÄĒ analogous to the two-sample t-test; tests whether two groups differ significantly in mean phase.</li> <li><strong>Watson U¬≤ test</strong> ‚ÄĒ non-parametric test for whether two samples come from the same circular distribution.</li></ul> <!>',1);function Fm(t){const e=String.raw`\bar{C} = \tfrac{1}{n}\sum_i \cos\theta_i,\quad \bar{S} = \tfrac{1}{n}\sum_i \sin\theta_i,\quad \bar{\theta} = \operatorname{arctan2}(\bar{S},\bar{C}),\quad R = \sqrt{\bar{C}^2+\bar{S}^2}`;kt(t,{id:"ch12",num:"Chapter 12",title:"Circular Statistics",children:(r,a)=>{var n=qm(),i=at(n);yr(i,{entries:[{year:1953,text:'R.A. Fisher <sup class="cite"><a href="#ref-13">[13]</a></sup> publishes foundational work on the statistics of circular distributions.'},{year:1981,text:'Kanti Mardia and Peter Jupp <sup class="cite"><a href="#ref-12">[12]</a></sup> publish the textbook <em>Directional Statistics</em> providing a comprehensive treatment, still the standard reference.'},{year:"1990s‚Äďpresent",text:"Circular statistics are increasingly applied in chronobiology for acrophase distributions, activity onset times, and sleep timing data. R packages <em>circular</em> and <em>CircStats</em> implement these methods."}]});var s=M(i,6);Vt(s,{get tex(){return e}});var o=M(s,8);It(o,{title:"Circular Statistics in AnCiR",tip:"Never use a standard unpaired t-test to compare acrophase times between groups ‚ÄĒ use the Watson-Williams test (the circular analogue of the t-test). A 23:00 acrophase and a 01:00 acrophase are only 2 hours apart circularly, but would appear 22 hours apart to a linear test.",children:(l,h)=>{var d=Lm();Tr(2),ee(l,d)},$$slots:{default:!0}}),ee(r,n)},$$slots:{default:!0}})}var Nm=re("<ol><li><strong>Import</strong> your data (time column + activity counts column).</li> <li><strong>Inspect visually:</strong> create a Scatterplot of raw data and a first Actogram to check data quality.</li> <li><strong>Remove outliers</strong> (Column Process: Remove Outliers) if there are implausible spikes.</li> <li><strong>Detrend</strong> (Column Process: Remove Trend, Linear) if there is a slow baseline drift.</li> <li><strong>Bin</strong> if needed (Table Process: Bin Data, e.g., 15-minute bins, Mean) to reduce noise and regularise sampling.</li> <li><strong>Actogram:</strong> create the main actogram with double-plotting and light-dark shading.</li> <li><strong>Periodogram:</strong> run Chi-squared periodogram to confirm the dominant period and estimate ŌĄ.</li> <li><strong>Cosinor:</strong> apply Cosinor (fixed-period = ŌĄ from step 7, or 24 h) to extract MESOR, amplitude, and acrophase with 95% confidence intervals.</li> <li><strong>Store</strong> key results (period, amplitude, acrophase) as stored values for reporting.</li></ol>"),Om=re("<ul><li><strong>Analysing raw, unpreprocessed data</strong> ‚ÄĒ always inspect and preprocess before formal analysis.</li> <li><strong>Assuming ŌĄ = exactly 24 h</strong> ‚ÄĒ always estimate ŌĄ from the periodogram; even a 0.5 h error matters for cosinor acrophase estimates.</li> <li><strong>Ōá¬≤ periodogram on sparse or irregular data</strong> ‚ÄĒ use Lomb-Scargle instead.</li> <li><strong>Linear statistics on circular phase data</strong> ‚ÄĒ use circular statistics for acrophase comparisons between groups.</li> <li><strong>Insufficient recording duration</strong> ‚ÄĒ at minimum 5‚Äď7 complete cycles are needed for reliable period estimation.</li> <li><strong>Chi-squared harmonics in square-wave data</strong> ‚ÄĒ may produce a spurious 12 h peak. Confirm with Lomb-Scargle.</li> <li><strong>Time-unspecified group comparisons</strong> ‚ÄĒ comparing groups at uncontrolled times without accounting for circadian variation can reverse effect directions (Refinetti et al. 2007, Fig. 26).</li> <li><strong>Ignoring masking</strong> ‚ÄĒ acute environmental effects can temporarily obscure the underlying rhythm.</li></ul>"),$m=re('For group comparisons of acrophase, polar plots provide an intuitive summary (amplitude = vector length, acrophase = vector angle). The 95% confidence ellipse shows joint uncertainty. For population-mean cosinor, individual vectors are plotted with the group mean vector and confidence region (Refinetti et al. 2007 <sup class="cite"><a href="#ref-1">[1]</a></sup>, Fig. 22).',1),Hm=re('<h3 class="section-head">Choosing the Right Method</h3> <!> <h3 class="section-head">Recommended Analysis Workflow for Actigraphy Data</h3> <!> <h3 class="section-head">Common Pitfalls</h3> <!> <h3 class="section-head">Reporting Standards</h3> <p>When reporting chronobiological analyses, include:</p> <ul><li>Data type, recording duration, and sampling resolution.</li> <li>Preprocessing steps (outlier removal, binning, smoothing) with parameters.</li> <li>Analysis method and software, including version and citation.</li> <li>Estimated period ŌĄ with 95% confidence interval.</li> <li>Cosinor parameters (MESOR, amplitude, acrophase) with 95% CIs, if applicable.</li> <li>Sample size; whether values represent group means or individual estimates.</li> <li>Statistical tests for group comparisons, with effect sizes and p-values.</li></ul> <!>',1);function Wm(t){kt(t,{id:"ch13",num:"Chapter 13",title:"Best Practices and Reporting",children:(e,r)=>{var a=Hm(),n=M(at(a),2);Jo(n,{headers:["Method","Best suited for"],rows:[["Actogram","Visual inspection, quality control, detecting phase shifts and free-running rhythms"],["Ōá¬≤ Periodogram","Period detection in dense, equally-spaced activity/locomotor data"],["Lomb-Scargle","Period detection in sparse, irregularly-spaced or clinical data"],["Cosinor (fixed-period)","Parameter estimation (amplitude, phase, MESOR) with CIs; group comparison"],["Cosinor (free-parameter)","Exploratory period estimation when ŌĄ is not known in advance"],["Mixed-effects cosinor","Multi-subject clinical studies with covariates"],["GAM (cyclic spline)","Non-sinusoidal waveforms; exploratory analysis"],["NPCRA (IS, IV)","Actigraphy in clinical populations; rhythm fragmentation assessment"],["Circular statistics","Comparing phase angles between groups"]]});var i=M(n,4);It(i,{title:"Standard Actigraphy Pipeline in AnCiR",tip:"",children:(l,h)=>{var d=Nm();ee(l,d)},$$slots:{default:!0}});var s=M(i,4);vn(s,{title:"Common Mistakes to Avoid",children:(l,h)=>{var d=Om();ee(l,d)},$$slots:{default:!0}});var o=M(s,8);hi(o,{title:"Reporting Acrophase",children:(l,h)=>{Tr();var d=$m();Tr(2),ee(l,d)},$$slots:{default:!0}}),ee(e,a)},$$slots:{default:!0}})}var Um=re('<table class="glossary-table"><tbody><tr><td>Acrophase</td><td>The time at which a rhythm reaches its maximum. Expressed as a clock time or in hours from a reference point (e.g., lights-on).</td></tr><tr><td>Amplitude</td><td>Half the peak-to-trough excursion of a rhythm. (Some authors use "amplitude" for the full excursion ‚ÄĒ be aware of this ambiguity.)</td></tr><tr><td>Autocorrelation</td><td>The correlation of a signal with a time-shifted version of itself.</td></tr><tr><td>Circadian rhythm</td><td>A biological oscillation with a period close to 24 hours, generated by an endogenous clock.</td></tr><tr><td>Duty cycle</td><td>The fraction of one period that a rectangular wave spends in the "high" state.</td></tr><tr><td>Entrainment</td><td>The synchronisation of an endogenous biological rhythm to an external zeitgeber cycle.</td></tr><tr><td>Free-running period (ŌĄ)</td><td>The period of a circadian rhythm in constant conditions (no external time cues).</td></tr><tr><td>Infradian rhythm</td><td>A biological oscillation with a period longer than 24 hours (e.g., menstrual cycle, seasonal rhythm).</td></tr><tr><td>IS (Interdaily Stability)</td><td>The fraction of total variance explained by the average 24-hour pattern; 0 (no regularity) to 1 (perfect).</td></tr><tr><td>IV (Intradaily Variability)</td><td>Mean squared difference between consecutive time points relative to overall variance; a measure of rhythm fragmentation.</td></tr><tr><td>MESOR</td><td>Midline Estimating Statistic Of Rhythm ‚ÄĒ the mean level of the fitted cosine curve; the rhythm-adjusted mean.</td></tr><tr><td>Period (ŌĄ)</td><td>The duration of one complete cycle of a rhythm (usually in hours).</td></tr><tr><td>Phase</td><td>The timing of a rhythm relative to a reference point (e.g., the time of peak activity).</td></tr><tr><td>Phase shift (őĒő¶)</td><td>A change in the timing of a rhythm in response to a stimulus.</td></tr><tr><td>PRC</td><td>Phase Response Curve ‚ÄĒ describes how phase shifts depend on the timing of a stimulus within the circadian cycle.</td></tr><tr><td>SCN</td><td>Suprachiasmatic nucleus ‚ÄĒ the master pacemaker of the mammalian circadian system, located in the anterior hypothalamus.</td></tr><tr><td>Ultradian rhythm</td><td>A biological oscillation with a period shorter than 24 hours (e.g., REM sleep cycles ~90 min).</td></tr><tr><td>Zeitgeber (ZT)</td><td>An environmental time cue (literally "time-giver") that synchronises a biological clock. ZT0 is typically defined as lights-on.</td></tr></tbody></table>');function Gm(t){kt(t,{id:"glossary",num:"Appendix A",title:"Glossary",children:(e,r)=>{var a=Um();ee(e,a)},$$slots:{default:!0}})}var jm=re("<p>A range of tools are available for chronobiological analysis:</p> <!>",1);function Vm(t){kt(t,{id:"software",num:"Appendix B",title:"Software Landscape",children:(e,r)=>{var a=jm(),n=M(at(a),2);S0(n,{headers:["Tool","Platform","Notes"],rows:[["AnCiR","Web browser (no install)","Free, open-source. Actograms, periodograms, cosinor, correlogram, FFT, preprocessing. All analyses in this handbook."],["ActogramJ","ImageJ plug-in","Free, open-source. Requires Java/ImageJ. Strong actogram tools."],["RhythmicAlly","R/Shiny (web)","Free, open-source. Requires R knowledge."],["BioDare2","Web browser","Free for academic use. Strong period analysis tools."],["zeitgebr / circatools","R packages","Free. Requires R knowledge. PRCs, circular statistics."],["ClockLab","Desktop (Windows)","Commercial. Comprehensive actogram and analysis suite."],["cosinor2 / CircadiPy","R / Python","Free. Cosinor, population-mean cosinor, group comparisons."]]}),ee(e,a)},$$slots:{default:!0}})}function Ym(t){kt(t,{id:"comparison",num:"Appendix C",title:"Tool Comparison",children:(e,r)=>{Jo(e,{headers:["Feature","AnCiR","ActogramJ","RhythmicAlly","BioDare2"],rows:[["Browser-based (no install)","‚úÖ","‚ĚĆ","‚úÖ","‚úÖ"],["No programming required","‚úÖ","‚úÖ","‚úÖ","‚úÖ"],["CSV/Excel import","‚úÖ","Partial","‚úÖ","‚úÖ"],["Ac
