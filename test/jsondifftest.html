<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>JSON Patch Tester (Array Precision)</title>
		<style>
			body {
				font-family: system-ui;
				padding: 20px;
				background: #f9f9f9;
			}
			.grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 20px;
			}
			textarea {
				width: 100%;
				height: 300px;
				font-family: monospace;
				border: 1px solid #ccc;
			}
			pre {
				background: #222;
				color: #7f7;
				padding: 15px;
				border-radius: 8px;
				overflow: auto;
				max-height: 400px;
			}
			.op-remove {
				color: #ff8888;
			}
			.op-add {
				color: #88ff88;
			}
			button {
				background: #007bff;
				color: white;
				border: none;
				padding: 10px 20px;
				border-radius: 4px;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<h1>Precision Diffing (JSON Patch)</h1>
		<p>
			This method flags <strong>removals</strong> and <strong>additions</strong> by their specific
			path.
		</p>

		<div class="grid">
			<div>
				<label>Original State</label>
				<textarea id="before">
{
  "data": [
    {"id": 0, "name": "time_0"},
    {"id": 1, "name": "values_0"},
    {"id": 6, "name": "After"}
  ]
}</textarea
				>
			</div>
			<div>
				<label>Modified State (Removed "After", Added "NewItem")</label>
				<textarea id="after">
{
  "data": [
    {"id": 0, "name": "time_0"},
    {"id": 1, "name": "values_0"},
    {"id": 99, "name": "NewItem"}
  ]
}</textarea
				>
			</div>
		</div>

		<button id="run" style="margin-top: 20px">Generate Patch</button>

		<h2>The Patch (What to store in your Undo stack)</h2>
		<pre id="output">Click run...</pre>

		<script type="module">
			import * as jsonpatch from 'https://cdn.skypack.dev/fast-json-patch';

			document.getElementById('run').onclick = () => {
				const t0 = performance.now();
				const val1 = JSON.parse(document.getElementById('before').value);
				const val2 = JSON.parse(document.getElementById('after').value);

				// Compare and generate operations
				const patch = jsonpatch.compare(val1, val2);

				document.getElementById('output').textContent = JSON.stringify(patch, null, 2);
				const t1 = performance.now();
				console.log(`Execution time: ${t1 - t0} milliseconds`);
			};
		</script>
	</body>
</html>
