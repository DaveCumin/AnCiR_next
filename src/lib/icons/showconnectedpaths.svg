<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g id="paths-connected-only"  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Only the Active/Connected Path remains visible -->
    <path d="M 4,12 C 8,12 8,6 12,6 C 16,6 16,18 20,18" stroke-width="2.5" />
    
    <!-- Only the active nodes on that path are visible -->
    <circle cx="4" cy="12" r="2.5" />
    <circle cx="12" cy="6" r="2.5" />
    <circle cx="20" cy="18" r="2.5" />
  </g>
</svg>
